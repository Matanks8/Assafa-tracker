<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קודי 2.1 - ניהול זמן ותכנון</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-pipe { height: 35px; border-radius: 18px; background: #e2e8f0; position: relative; overflow: hidden; border: 2px solid #f1f5f9; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); transition: width 0.5s ease; position: absolute; z-index: 5; }
        .progress-planned { height: 100%; background: #fde047; transition: width 0.5s ease; position: absolute; z-index: 4; opacity: 0.7; }
        .marker { position: absolute; top: 0; bottom: 0; width: 4px; background: #ef4444; z-index: 10; border-radius: 2px; }
        .log-container { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 1rem; }
        .tab-btn { padding: 10px; font-weight: bold; flex: 1; text-align: center; border-radius: 12px; transition: all 0.2s; }
        .tab-active { background: white; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); color: #4f46e5; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 8px; border: 1px solid #f1f5f9; }
        .has-event { background: #eef2ff; border-color: #c7d2fe; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-20">

    <header class="bg-indigo-600 text-white p-6 shadow-lg rounded-b-[2.5rem] sticky top-0 z-40">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-bold">מתן - ניהול זמן ⌨️</h1>
            <span id="currentMonthHeader" class="bg-indigo-500 px-3 py-1 rounded-full text-sm font-medium"></span>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav class="flex p-2 bg-slate-200/50 mx-4 mt-4 rounded-2xl gap-1">
        <button onclick="switchTab('dash')" id="tabDash" class="tab-btn tab-active">לוח מחוונים</button>
        <button onclick="switchTab('cal')" id="tabCal" class="tab-btn text-slate-500">לוח שנה</button>
    </nav>

    <main id="viewDash" class="p-4 space-y-5">
        <!-- Dashboard Card -->
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="text-xs text-slate-500 block">נותר לביצוע (בפועל)</span>
                    <span class="text-4xl font-black text-indigo-600" id="hoursRemaining">0</span>
                    <span class="text-lg text-indigo-400">שעות</span>
                </div>
                <div class="text-left">
                    <span class="text-[10px] text-slate-500 block">יעד</span>
                    <input type="number" id="targetInput" step="0.25" onchange="updateTarget()" 
                           class="w-16 text-center font-bold text-slate-700 bg-slate-100 rounded-lg p-1 outline-none">
                </div>
            </div>

            <div class="progress-pipe mb-2 shadow-inner">
                <div id="marker" class="marker"></div>
                <div id="progressFill" class="progress-fill"></div>
                <div id="plannedFill" class="progress-planned"></div>
            </div>
            <div class="flex justify-between text-[10px] text-slate-400 font-bold uppercase">
                <span>0%</span>
                <span class="text-yellow-500">צהוב = מתוכנן</span>
                <span>100%</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="toggleCheckIn()" id="checkBtn" class="bg-white p-4 rounded-3xl shadow-sm border border-indigo-100 flex flex-col items-center">
                <span id="checkIcon" class="text-2xl mb-1">📍</span>
                <span id="checkText" class="font-bold text-sm">כניסה</span>
            </button>
            <button onclick="openManualModal()" class="bg-white p-4 rounded-3xl shadow-sm border border-emerald-100 flex flex-col items-center">
                <span class="text-2xl mb-1">📝</span>
                <span class="font-bold text-sm text-slate-700">הוספה/תכנון</span>
            </button>
        </div>

        <div id="predictionBox" class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 text-indigo-800 text-xs"></div>

        <!-- Activity Log -->
        <div class="log-container">
            <h3 class="font-bold text-slate-800 mb-3 flex justify-between items-center text-sm">
                <span>יומן פעילות</span>
                <span class="text-[10px] text-slate-400">בוצע / מתוכנן</span>
            </h3>
            <div id="logList" class="space-y-2 max-h-64 overflow-y-auto"></div>
        </div>

        <button onclick="resetMonth()" class="w-full text-xs text-slate-300">איפוס נתונים</button>
    </main>

    <!-- Calendar View -->
    <main id="viewCal" class="hidden p-4 space-y-4">
        <div class="bg-white p-4 rounded-3xl shadow-xl">
            <div id="calendarGrid" class="calendar-grid">
                <!-- Days will be injected here -->
            </div>
        </div>
        <div class="flex gap-2 flex-wrap justify-center text-[10px] font-bold text-slate-400">
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full"></span> בוצע</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-yellow-400 rounded-full"></span> מתוכנן</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-orange-400 rounded-full"></span> חופשה</div>
        </div>
    </main>

    <!-- Modal -->
    <div id="manualModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white w-full rounded-[2.5rem] p-6 shadow-2xl">
            <h2 class="text-lg font-bold mb-4">דיווח / תכנון פעילות</h2>
            <div class="space-y-3">
                <input type="date" id="entryDate" class="w-full bg-slate-100 rounded-xl p-3 text-sm">
                <select id="entryType" class="w-full bg-slate-100 rounded-xl p-3 text-sm">
                    <option value="עבודה">🏢 עבודה</option>
                    <option value="הדרכה">📚 הדרכה</option>
                    <option value="חופשה/חג">🏖️ חופשה (מוריד יעד)</option>
                </select>
                <input type="number" id="entryHours" placeholder="כמות שעות" class="w-full bg-slate-100 rounded-xl p-3 text-sm">
                
                <label class="flex items-center gap-2 p-3 bg-indigo-50 rounded-xl">
                    <input type="checkbox" id="isPlanned" class="w-5 h-5 rounded text-indigo-600">
                    <span class="text-sm font-bold text-indigo-700">זהו אירוע מתוכנן (טרם קרה)</span>
                </label>

                <div class="flex gap-2 pt-2">
                    <button onclick="closeManualModal()" class="flex-1 font-bold text-slate-400">ביטול</button>
                    <button onclick="saveManualEntry()" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl">שמירה</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('matan_tracker_v2.1')) || {
            targetHours: 42.25,
            logs: [],
            isCheckedIn: false,
            checkInTime: null
        };

        const monthNames = ["ינואר", "פברואר", "מרץ", "אפריל", "מאי", "יוני", "יולי", "אוגוסט", "ספטמבר", "אוקטובר", "נובמבר", "דצמבר"];
        
        function init() {
            const now = new Date();
            document.getElementById('currentMonthHeader').innerText = monthNames[now.getMonth()] + ' ' + now.getFullYear();
            document.getElementById('targetInput').value = state.targetHours;
            document.getElementById('entryDate').valueAsDate = now;
            renderAll();
        }

        function switchTab(tab) {
            document.getElementById('viewDash').classList.toggle('hidden', tab !== 'dash');
            document.getElementById('viewCal').classList.toggle('hidden', tab !== 'cal');
            document.getElementById('tabDash').classList.toggle('tab-active', tab === 'dash');
            document.getElementById('tabCal').classList.toggle('tab-active', tab === 'cal');
            if(tab === 'cal') renderCalendar();
        }

        function renderAll() {
            const now = new Date();
            const totalWorked = state.logs
                .filter(l => l.type !== 'חופשה/חג' && !l.planned)
                .reduce((sum, l) => sum + parseFloat(l.hours), 0);
            
            const totalPlanned = state.logs
                .filter(l => l.type !== 'חופשה/חג' && l.planned)
                .reduce((sum, l) => sum + parseFloat(l.hours), 0);

            const totalHolidays = state.logs
                .filter(l => l.type === 'חופשה/חג')
                .reduce((sum, l) => sum + parseFloat(l.hours), 0);

            const effectiveTarget = state.targetHours - totalHolidays;
            const remaining = Math.max(effectiveTarget - totalWorked, 0);

            // UI Updates
            document.getElementById('hoursRemaining').innerText = remaining.toFixed(2);
            document.getElementById('progressFill').style.width = `${Math.min((totalWorked / effectiveTarget) * 100, 100)}%`;
            document.getElementById('plannedFill').style.width = `${Math.min(((totalWorked + totalPlanned) / effectiveTarget) * 100, 100)}%`;

            // Marker
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            document.getElementById('marker').style.right = `${100 - (now.getDate() / daysInMonth * 100)}%`;

            renderLogs();
            calculatePrediction(remaining);
            localStorage.setItem('matan_tracker_v2.1', JSON.stringify(state));
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = state.logs.length === 0 ? '<p class="text-center text-slate-400 text-xs py-4">אין פעילות</p>' : '';
            [...state.logs].reverse().forEach((log, idx) => {
                const realIdx = state.logs.length - 1 - idx;
                const div = document.createElement('div');
                div.className = `flex justify-between items-center p-3 rounded-xl border ${log.planned ? 'bg-yellow-50 border-yellow-100' : 'bg-white border-slate-100'} shadow-sm text-xs`;
                div.innerHTML = `
                    <div>
                        <span class="font-bold">${log.type} ${log.planned ? '(מתוכנן)' : ''}</span>
                        <div class="text-[10px] text-slate-400">${log.date.split('-').reverse().join('/')} | ${log.hours} שעות</div>
                    </div>
                    <button onclick="deleteLog(${realIdx})" class="text-slate-300 px-2">✕</button>
                `;
                list.appendChild(div);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayLogs = state.logs.filter(l => l.date === dateStr);
                const isToday = d === now.getDate();
                
                let bgColor = '';
                if(dayLogs.some(l => l.type === 'חופשה/חג')) bgColor = 'bg-orange-100 text-orange-600';
                else if(dayLogs.some(l => !l.planned)) bgColor = 'bg-green-100 text-green-700';
                else if(dayLogs.some(l => l.planned)) bgColor = 'bg-yellow-100 text-yellow-700';

                grid.innerHTML += `<div class="calendar-day ${bgColor} ${isToday ? 'border-2 border-indigo-500 font-bold' : ''}">
                    ${d}
                    <div class="text-[8px]">${dayLogs.length > 0 ? dayLogs.reduce((s,l)=>s+parseFloat(l.hours),0).toFixed(1) : ''}</div>
                </div>`;
            }
        }

        function toggleCheckIn() {
            const now = new Date();
            if (!state.isCheckedIn) {
                state.isCheckedIn = true;
                state.checkInTime = now.getTime();
            } else {
                const diffHrs = ((now.getTime() - state.checkInTime) / 3600000).toFixed(2);
                state.logs.push({ date: now.toISOString().split('T')[0], type: 'עבודה', hours: diffHrs, planned: false });
                state.isCheckedIn = false;
            }
            renderAll();
        }

        function saveManualEntry() {
            const log = {
                date: document.getElementById('entryDate').value,
                type: document.getElementById('entryType').value,
                hours: parseFloat(document.getElementById('entryHours').value),
                planned: document.getElementById('isPlanned').checked
            };
            if(log.date && log.hours) {
                state.logs.push(log);
                closeManualModal();
                renderAll();
            }
        }

        function deleteLog(i) { if(confirm("למחוק?")) { state.logs.splice(i, 1); renderAll(); } }
        function updateTarget() { state.targetHours = parseFloat(document.getElementById('targetInput').value); renderAll(); }
        function openManualModal() { document.getElementById('manualModal').classList.remove('hidden'); }
        function closeManualModal() { document.getElementById('manualModal').classList.add('hidden'); }
        function resetMonth() { if(confirm("לאפס הכל?")) { state.logs = []; state.isCheckedIn = false; renderAll(); } }
        
        function calculatePrediction(remaining) {
            const now = new Date();
            const last = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            let count = 0;
            for (let d = now.getDate() + 1; d <= last; d++) {
                const day = new Date(now.getFullYear(), now.getMonth(), d).getDay();
                if (day === 0 || day === 3) count++;
            }
            document.getElementById('predictionBox').innerHTML = `נותרו <strong>${count}</strong> ימי עבודה (א', ד'). ממוצע נדרש: <strong>${(count > 0 ? remaining / count : 0).toFixed(2)}</strong> שעות.`;
        }

        init();
    </script>
</body>
</html>
